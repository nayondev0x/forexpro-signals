services:
  - type: web
    name: forexpro-signals
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: TWELVE_DATA_API_KEY
        sync: false
      - key: TWELVE_DATA_API_HOST
        value: twelve-data1.p.rapidapi.com
      - key: TWELVE_DATA_API_KEY_2
        sync: false
      - key: TWELVE_DATA_API_HOST_2
        value: twelve-data1.p.rapidapi.com
      - key: ALPHA_VANTAGE_API_KEY
        sync: false
      - key: ALPHA_VANTAGE_API_HOST
        value: alpha-vantage.p.rapidapi.com
      - key: ALPHA_VANTAGE_API_KEY_2
        sync: false
      - key: ALPHA_VANTAGE_API_HOST_2
        value: alpha-vantage.p.rapidapi.com
      - key: TRADER_CALENDAR_API_KEY
        sync: false
      - key: TRADER_CALENDAR_API_HOST
        value: trader-calendar.p.rapidapi.com
      - key: BREAKING_NEWS_API_KEY
        sync: false
      - key: BREAKING_NEWS_API_HOST
        value: myallies-breaking-news-v1.p.rapidapi.com
      - key: STOCK_PRICES_API_KEY
        sync: false
      - key: STOCK_PRICES_API_HOST
        value: stock-prices2.p.rapidapi.com